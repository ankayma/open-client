# GitHub Actions — macOS signed+notarized DMG + Tauri auto-update artifacts.
#
# Runs on GitHub Actions: the macOS pipeline needs a real macos-14 runner. All CI
# lives on GitHub now (see .github/workflows/ci.yml for per-commit lint/test) —
# push the release tag to the `github` remote (public mirror,
# github.com/ankayma/open-client) to trigger this workflow.
#
# Reuses scripts/release-macos.sh as-is (Part D release pipeline §3.2, already
# working) — this workflow only supplies the signing/notarization secrets it
# expects via env, then post-processes the output into latest.json.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   APPLE_CERT_P12_BASE64        `openssl base64 -A -in DeveloperIDApplication.p12`
#   APPLE_CERT_PASSWORD          password the .p12 was exported with
#   APPLE_SIGNING_IDENTITY       "Developer ID Application: <Name> (<TEAMID>)"
#   APPLE_TEAM_ID                10-char Apple team id
#   APPLE_API_KEY                App Store Connect API key id
#   APPLE_API_ISSUER             App Store Connect API issuer id
#   APPLE_API_KEY_P8_BASE64      base64 of the AuthKey_<APPLE_API_KEY>.p8 file
#   TAURI_SIGNING_PRIVATE_KEY            minisign private key (see `cargo tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   password for the above
#
# R2 publish (§4.5 — bucket + custom domain for get.ankayma.com provisioned
# 2026-07-02):
#   R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_ENDPOINT   R2 S3-compatible API token
#   R2_BUCKET_MACOS   bucket behind get.ankayma.com (also used by
#                      release-linux.yml for the curl|sh channel at bucket root)
name: release-macos

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

jobs:
  build-sign-notarize:
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: write   # GITHUB_TOKEN needs this to create/edit the GitHub Release
      id-token: write        # OIDC token for GitHub Artifact Attestations (Sigstore)
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned via rust-toolchain.toml)
        run: rustup show

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd frontend/app-gui && npm install

      - name: Install cargo-tauri CLI
        run: cargo install tauri-cli --locked --version "^2" --root "$HOME/.cargo-tauri"

      - name: Import signing certificate into a temporary keychain
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/release-macos.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "$APPLE_CERT_P12_BASE64" | base64 -d -o "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          echo "$APPLE_API_KEY_P8_BASE64" | base64 -d -o "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build + sign + notarize DMG (scripts/release-macos.sh)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          export PATH="$HOME/.cargo-tauri/bin:$PATH"
          bash scripts/release-macos.sh

      - name: Remove temporary keychain + API key
        if: always()
        run: |
          [ -n "${KEYCHAIN_PATH:-}" ] && security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$RUNNER_TEMP/AuthKey.p8"

      - name: Assemble latest.json (Tauri updater manifest)
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/.*"version": *"\(.*\)".*/\1/p' gui/src-tauri/tauri.conf.json | head -1)"
          BUNDLE_DIR="target/universal-apple-darwin/release/bundle"
          DMG="$(find "$BUNDLE_DIR/dmg" -iname '*.dmg' | head -1)"
          UPDATER_ARCHIVE="$(find "$BUNDLE_DIR/macos" -iname '*.app.tar.gz' | head -1)"
          SIGNATURE="$(cat "$UPDATER_ARCHIVE.sig")"
          mkdir -p publish
          cp "$DMG" "$UPDATER_ARCHIVE" publish/
          cat > publish/latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See release notes on GitHub.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": {
                "signature": "$SIGNATURE",
                "url": "https://get.ankayma.com/macos/$(basename "$UPDATER_ARCHIVE")"
              }
            }
          }
          EOF

      - name: Publish to R2 (get.ankayma.com)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync publish/ "s3://${{ secrets.R2_BUCKET_MACOS }}/macos/" --endpoint-url "${{ secrets.R2_ENDPOINT }}"

      # macOS user-facing download lives on the GitHub Release (the .dmg); the R2
      # copy above is the auto-updater channel (latest.json + .app.tar.gz). Tags only —
      # workflow_dispatch has no tag to attach to.
      - name: Publish GitHub Release (macOS dmg)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          DMG="$(find publish -iname '*.dmg' | head -1)"
          BASENAME="$(basename "$DMG")"
          SHA="$(shasum -a 256 "$DMG" | cut -d' ' -f1)"
          cat > "$RUNNER_TEMP/relnotes.md" <<EOF
          macOS build of the Ankayma client — $TAG.

          **Download:** \`$BASENAME\` — universal binary (Apple Silicon + Intel), Developer ID signed and Apple-notarized (no Gatekeeper warning).

          **Install:** open the DMG, drag **Ankayma** into Applications.

          **Integrity (SHA-256)**
          \`\`\`
          $SHA  $BASENAME
          \`\`\`

          _Linux headless CLI: \`curl -sSfL https://get.ankayma.com/install.sh | sh\`. macOS auto-update is served from get.ankayma.com; this DMG is the first-install download._
          EOF
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" --clobber
            gh release edit "$TAG" --title "Ankayma $TAG (macOS)" --notes-file "$RUNNER_TEMP/relnotes.md"
          else
            gh release create "$TAG" "$DMG" --title "Ankayma $TAG (macOS)" --notes-file "$RUNNER_TEMP/relnotes.md"
          fi

      # SLSA build provenance on the DMG (Sigstore + Rekor). Best-effort ONLY:
      # continue-on-error keeps the job green so this can NEVER block the notarized
      # DMG release — the DMG is already signed, notarized, published to R2 and the
      # GitHub Release above by the time this runs. Additive to Apple notarization.
      - name: Attest build provenance (.dmg)
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "publish/*.dmg"
