# GitLab CI/CD — client repo (public)
# Stages: test → sign → release
#
# "Deploy" client khác control-plane: agent-daemon chạy trên máy user,
# không deploy lên VPS. Thay vào đó → publish GitLab Release để user download.
#
# CI/CD variables cần set (Settings → CI/CD → Variables):
#   COSIGN_PRIVATE_KEY   Variable, Masked — cosign.key base64-1-dòng:
#                          `openssl base64 -A -in cosign.key | pbcopy`. CI decode lại
#                          thành file lúc ký. Mask được vì base64 -A là 1 dòng (no newline);
#                          kín hơn File-type (vốn chỉ Visible).
#   COSIGN_PASSWORD      masked      — password của cosign key (single-line, mask được).
#
# cosign.pub được commit vào repo (public key, không nhạy cảm) — bắt buộc có,
# nếu thiếu thì sign stage fail ở bước verify.
#
# Cách tạo release: push git tag vX.Y.Z lên main
#   git tag v0.1.0 && git push origin v0.1.0
# → GitLab tự tạo release page với binary đính kèm.
#
# Main branch push → lint + test + sign (binary là artifact, không tạo release).
# Tag push (vX.Y.Z) → lint + test + sign + publish release.
#
# GUI (ankayma-gui / Tauri) KHÔNG nằm trong job lint/test: nó cần GUI system libs
# theo từng nền (webkit2gtk/gtk/libsoup trên Linux…) và được build bằng Tauri
# toolchain riêng cho 5 platform (milestone 1.1 gate — không phải per-commit CI).
# `cargo fmt` vẫn phủ TOÀN BỘ crate kể cả GUI. Job `gui-check-linux` (manual)
# compile-check GUI trên Linux khi cần. [P.3] gap này khai báo rõ, không giấu.

image: rust:1.96-slim   # [T:A.1.21] khớp rust-toolchain.toml (channel 1.96.0)

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  RUSTFLAGS: "-D warnings"

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .cargo/registry/
    - target/

stages:
  - test
  - sign
  - release

# ── Lint: fmt (mọi crate) + clippy (logic crates) ───────────────────────────
# CLAUDE.md workflow §3: fmt --check + clippy -D warnings bắt buộc trước "done".
lint:
  stage: test
  before_script:
    - rustup component add rustfmt clippy
  script:
    - cargo fmt --all -- --check
    - cargo clippy --workspace --exclude ankayma-gui --all-targets --locked -- -D warnings

# ── Test (logic crates; GUI build riêng — xem header) ───────────────────────
test:
  stage: test
  script:
    - cargo test --workspace --exclude ankayma-gui --locked

# ── (manual) compile-check GUI trên Linux ───────────────────────────────────
# Tách riêng vì cần webkit/gtk system libs; chạy thủ công hoặc khi đụng GUI.
gui-check-linux:
  stage: test
  when: manual
  allow_failure: true
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev
        libjavascriptcoregtk-4.1-dev build-essential pkg-config
  script:
    - cargo check -p ankayma-gui --locked

# ── Build + Sign (main branch + tags) ───────────────────────────────────────
sign:
  stage: sign
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - COSIGN_VERSION=v2.4.1   # [T:A.1.21] pin version
    - curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
        -o /usr/local/bin/cosign
    # TODO[A]: verify checksum/chữ ký của chính binary cosign (A.1.21 hardening) —
    # cosign releases có cosign_checksums.txt; thêm khi siết supply-chain.
    - chmod +x /usr/local/bin/cosign
  script:
    - cargo build --release --locked --bin agent-daemon
    # COSIGN_PRIVATE_KEY = cosign.key base64-1-dòng (Masked) → decode lại thành file.
    - echo "$COSIGN_PRIVATE_KEY" | base64 -d > "$CI_PROJECT_DIR/cosign.key"
    # Ký offline bằng key; tlog-upload=false để không phụ thuộc Rekor network.
    - cosign sign-blob --yes --tlog-upload=false --key "$CI_PROJECT_DIR/cosign.key"
        --output-signature target/release/agent-daemon.sig
        target/release/agent-daemon
    - cosign verify-blob --insecure-ignore-tlog --key cosign.pub
        --signature target/release/agent-daemon.sig
        target/release/agent-daemon
  after_script:
    # Luôn xoá key đã decode, kể cả khi job fail giữa chừng.
    - rm -f "$CI_PROJECT_DIR/cosign.key"
  artifacts:
    paths:
      - target/release/agent-daemon
      - target/release/agent-daemon.sig
    expire_in: 30 days

# ── Publish GitLab Release (tags vX.Y.Z only) ───────────────────────────────
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  needs: [sign]
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    # Upload binary + chữ ký lên GitLab Package Registry để đính kèm Release
    - |
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file target/release/agent-daemon \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/agent-daemon/${CI_COMMIT_TAG}/agent-daemon-linux-amd64"
    - |
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file target/release/agent-daemon.sig \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/agent-daemon/${CI_COMMIT_TAG}/agent-daemon-linux-amd64.sig"
  script:
    - echo "Creating GitLab Release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Ankayma Agent $CI_COMMIT_TAG"
    description: |
      ## Ankayma Agent Daemon $CI_COMMIT_TAG

      ### Verify before running
      ```bash
      cosign verify-blob --insecure-ignore-tlog --key cosign.pub \
        --signature agent-daemon-linux-amd64.sig \
        agent-daemon-linux-amd64
      ```
    assets:
      links:
        - name: "agent-daemon (Linux x86_64)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/agent-daemon/${CI_COMMIT_TAG}/agent-daemon-linux-amd64"
        - name: "agent-daemon.sig (Cosign signature)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/agent-daemon/${CI_COMMIT_TAG}/agent-daemon-linux-amd64.sig"
