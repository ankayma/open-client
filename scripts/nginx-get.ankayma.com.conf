# get.ankayma.com — static download host for the Ankayma Linux client.
# Serves: /install.sh, /cosign.pub, /<version>/* (mesh-linux-amd64, agent-linux-amd64,
# SHA256SUMS, SHA256SUMS.sig). Consumed by scripts/install.sh (default BASE_URL).
#
# Fronted by Cloudflare (DNS A record "get" → origin IP, Proxied) in SSL mode
# Full (strict): Cloudflare connects to the origin over :443 and validates a real
# certificate — so this origin terminates TLS with a Let's Encrypt cert (below).
# One server block answers both :80 and :443 with the same root/locations.
#
# DEPLOY (run on the VPS as root):
#   install -d -o www-data -g www-data /var/www/get.ankayma.com
#   # one-time LE cert (HTTP-01 works through Cloudflare while Always-Use-HTTPS is off):
#   certbot certonly --webroot -w /var/www/get.ankayma.com -d get.ankayma.com \
#     --non-interactive --agree-tos -m you@example.com --no-eff-email
#   ln -s /etc/nginx/sites-available/get.ankayma.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# Upload a release (from a build box — see scripts/release-linux.sh):
#   rsync -av dist/<version>/ root@<origin>:/var/www/get.ankayma.com/<version>/
#   cp /var/www/get.ankayma.com/<version>/install.sh /var/www/get.ankayma.com/install.sh
#   ln -sfn <version> /var/www/get.ankayma.com/latest
#   # then purge the Cloudflare cache for /install.sh and /latest/*

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name get.ankayma.com;

    # Origin TLS for Cloudflare Full (strict). Let's Encrypt, auto-renewed by certbot.
    ssl_certificate     /etc/letsencrypt/live/get.ankayma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/get.ankayma.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:2m;
    ssl_session_timeout 1h;

    root /var/www/get.ankayma.com;
    autoindex off;
    default_type application/octet-stream;   # download host: force-download by default

    access_log /var/log/nginx/get.ankayma.com.access.log;
    error_log  /var/log/nginx/get.ankayma.com.error.log;

    gzip on;
    gzip_types text/plain text/x-shellscript;
    client_max_body_size 1m;                 # GET-only host; no uploads expected

    # Read-only host: only GET/HEAD. Everything else → 405.
    if ($request_method !~ ^(GET|HEAD)$) { return 405; }

    # --- Cloudflare real client IP (proxied / orange-cloud) ---------------------
    # So logs and rate-limits see the real user, not Cloudflare's edge. Keep the
    # ranges current from https://www.cloudflare.com/ips/ (or use a generated snippet).
    #   set_real_ip_from 173.245.48.0/20;
    #   ... (full IPv4 + IPv6 list) ...
    #   real_ip_header CF-Connecting-IP;

    # ACME HTTP-01 renewals (served over :80 through Cloudflare).
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    # Bare host → the install guide on the main site.
    location = / { return 302 https://ankayma.com/install-linux.html; }

    # Versioned artifacts are immutable — cache hard at Cloudflare + browser.
    location ~ "^/v[0-9]+\.[0-9]+\.[0-9]+/" {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # install.sh — the entry point; keep fresh so users always get current logic.
    location = /install.sh {
        default_type text/x-shellscript;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }

    # `latest/…`, cosign.pub, and anything else move between releases — short cache.
    location / {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }
}
