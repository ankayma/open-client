[package]
name = "ankayma-gui"
version = "0.1.0"
description = "Ankayma GUI shell (Tauri 2)"
authors = []
license = "Apache-2.0"
edition = "2021"
rust-version = "1.77.2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.2", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.11.2", features = [] }
tauri-plugin-log = "2"
# Control-plane calls go through agent-core (A.1.1). `open` launches the system
# browser for the GitHub OAuth start. [T:A.1.21]
agent-core = { workspace = true }
open = "5"
