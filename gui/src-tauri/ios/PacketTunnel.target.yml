  # Packet Tunnel Provider extension. Appended under `targets:` of the cargo-mobile2
  # project.yml by scripts/ios-postinit.sh. Paths are relative to gen/apple (where
  # project.yml lives): ../../ios = gui/src-tauri/ios; ../../../../crates = the
  # workspace crates dir. [T:A.1.9]
  ankayma-gui_PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: ../../ios/PacketTunnel
    info:
      # Written by xcodegen from the properties below, into gen/apple (gitignored).
      path: AnkaymaTunnel-Info.plist
      properties:
        CFBundleDisplayName: Ankayma Tunnel
        # Must track the host app's version (gui/src-tauri/tauri.conf.json) — Apple
        # rejects an extension whose CFBundleShortVersionString/Version diverges from
        # the app it ships in. [A: bump together until this is generated from one source]
        CFBundleShortVersionString: 1.1.14
        CFBundleVersion: "1.1.14"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      # Written by xcodegen from properties into gen/apple (gitignored). NE
      # packet-tunnel-provider + the App Group the host app shares config through.
      path: AnkaymaTunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.ankayma.app
    settings:
      base:
        PRODUCT_NAME: AnkaymaTunnel
        PRODUCT_BUNDLE_IDENTIFIER: com.ankayma.app.tunnel
        DEVELOPMENT_TEAM: 8UF87JS6WW
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        SWIFT_VERSION: "5.0"
        SWIFT_OBJC_BRIDGING_HEADER: ../../ios/PacketTunnel/PacketTunnel-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(inherited) $(PROJECT_DIR)/../../../../crates/agent-ios-ptp/include
        LIBRARY_SEARCH_PATHS: $(inherited) $(PROJECT_DIR)/PTPLib/$(CONFIGURATION)
        OTHER_LDFLAGS: $(inherited) -lagent_ios_ptp
    dependencies:
      - sdk: NetworkExtension.framework
    preBuildScripts:
      - name: Build PTP Rust staticlib
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          # Workspace root = gen/apple up four levels (apple→gen→src-tauri→gui→client).
          ROOT="$SRCROOT/../../../.."
          case "$PLATFORM_NAME" in
            iphonesimulator) TRIPLE="aarch64-apple-ios-sim" ;;
            *)               TRIPLE="aarch64-apple-ios" ;;
          esac
          if [ "$CONFIGURATION" = "release" ]; then PROFILE="--release"; OUT="release"; else PROFILE=""; OUT="debug"; fi
          ( cd "$ROOT" && cargo build -p agent-ios-ptp --target "$TRIPLE" $PROFILE )
          # PTPLib (NOT Externals) — the app target globs `- path: Externals` as
          # sources, so a .a placed under Externals/ptp gets copied into the app
          # bundle as a resource AND linked by the extension → "duplicate output
          # file" build failure. Keep the staticlib outside the app's source globs.
          DEST="$SRCROOT/PTPLib/$CONFIGURATION"
          mkdir -p "$DEST"
          cp "$ROOT/target/$TRIPLE/$OUT/libagent_ios_ptp.a" "$DEST/libagent_ios_ptp.a"
